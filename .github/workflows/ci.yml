name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install CI tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Check formatting
        run: make format-check

      - name: Check imports
        run: make imports-check

      - name: Run go vet
        run: make vet

      - name: Validate dependencies
        run: make deps-check

      - name: Run lint
        run: make lint

      - name: Run security checks
        run: make security

      - name: Validate JavaScript
        run: make validate-js

      - name: Run JavaScript tests
        run: make test-js

      - name: Publish quality summary
        run: |
          {
            echo "### Quality Summary"
            echo "- Go formatting/imports/vet/lint passed"
            echo "- Dependency checks passed"
            echo "- Security checks passed"
            echo "- JavaScript validation/tests passed"
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Run unit tests with coverage
        run: |
          mkdir -p test/cover
          go test -v -race -timeout 5m \
            -covermode=atomic \
            -coverprofile=test/cover/coverage.out \
            -coverpkg=./internal/... ./...

      - name: Run integration tests
        run: go test -v -race -tags=integration -timeout 5m ./test/integration/...

      - name: Run e2e tests
        run: go test -v -race -tags=e2e -timeout 5m ./test/e2e/...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: test/cover/coverage.out
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          file: ./test/cover/coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Publish test summary
        run: |
          COVERAGE=$(go tool cover -func=test/cover/coverage.out | awk '/total:/ {print $3}')
          {
            echo "### Test Summary"
            echo "- Unit tests: passed"
            echo "- Integration tests: passed"
            echo "- E2E tests: passed"
            echo "- Coverage: ${COVERAGE:-unknown}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build binaries
        run: make build

      - name: Build Docker image
        run: make docker-build

      - name: Archive binaries
        run: tar -czf gitvista-binaries.tar.gz gitvista gitvista-cli

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: gitvista-binaries.tar.gz
          if-no-files-found: error

      - name: Publish build summary
        run: |
          {
            echo "### Build Summary"
            echo "- Binaries built: gitvista, gitvista-cli"
            echo "- Docker build: passed"
            echo "- Artifact uploaded: build-artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, tests, build]
    steps:
      - name: Verify required jobs
        run: |
          QUALITY='${{ needs.quality.result }}'
          TESTS='${{ needs.tests.result }}'
          BUILD='${{ needs.build.result }}'

          {
            echo "### CI Result"
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Quality & Security | ${QUALITY} |"
            echo "| Go Tests | ${TESTS} |"
            echo "| Build Artifacts | ${BUILD} |"
          } >> "$GITHUB_STEP_SUMMARY"

          [ "$QUALITY" = "success" ] && [ "$TESTS" = "success" ] && [ "$BUILD" = "success" ]
