name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-go1.26-goimports-v0.38.0-govulncheck-v1.1.4-gosec-v2.22.9

      - name: Install missing CI tools
        run: |
          command -v goimports >/dev/null || go install golang.org/x/tools/cmd/goimports@v0.38.0
          command -v govulncheck >/dev/null || go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          command -v gosec >/dev/null || go install github.com/securego/gosec/v2/cmd/gosec@v2.22.9

      - name: Check formatting
        run: make fmt-check

      - name: Run go vet
        run: make vet

      - name: Validate dependencies
        run: make deps-check

      - name: Run lint
        run: make lint

      - name: Run security checks
        run: make security

      - name: Validate JavaScript
        run: make validate-js

      - name: Run JavaScript tests
        run: make test-js

      - name: Publish quality summary
        run: |
          {
            echo "### Quality Summary"
            echo "- Go formatting/imports/vet/lint passed"
            echo "- Dependency checks passed"
            echo "- Security checks passed"
            echo "- JavaScript validation/tests passed"
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Run unit tests with coverage
        run: |
          mkdir -p test/cover
          go test -v -race -timeout 5m \
            -covermode=atomic \
            -coverprofile=test/cover/coverage.out \
            -coverpkg=./internal/... ./... ./gitcore

      - name: Run e2e tests
        run: make e2e

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: test/cover/coverage.out
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          file: ./test/cover/coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Publish test summary
        run: |
          COVERAGE=$(go tool cover -func=test/cover/coverage.out | awk '/total:/ {print $3}')
          {
            echo "### Test Summary"
            echo "- Unit tests: passed"
            echo "- Integration tests: passed"
            echo "- E2E tests: passed"
            echo "- Coverage: ${COVERAGE:-unknown}"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum

      - name: Build binaries
        run: make build

      - name: Archive binaries
        run: tar -czf gitvista-binaries.tar.gz vista cli

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: gitvista-binaries.tar.gz
          if-no-files-found: error

      - name: Publish build summary
        run: |
          {
            echo "### Build Summary"
            echo "- Binaries built: vista, cli"
            echo "- Artifact uploaded: build-artifacts"
          } >> "$GITHUB_STEP_SUMMARY"

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [quality, tests, build]
    steps:
      - name: Verify required jobs
        run: |
          QUALITY='${{ needs.quality.result }}'
          TESTS='${{ needs.tests.result }}'
          BUILD='${{ needs.build.result }}'

          {
            echo "### CI Result"
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Quality & Security | ${QUALITY} |"
            echo "| Go Tests | ${TESTS} |"
            echo "| Build Artifacts | ${BUILD} |"
          } >> "$GITHUB_STEP_SUMMARY"

          [ "$QUALITY" = "success" ] && [ "$TESTS" = "success" ] && [ "$BUILD" = "success" ]
