version: 2

project_name: gitvista

before:
  hooks:
    - go mod tidy

builds:
  - id: gitvista
    main: ./cmd/vista
    binary: gitvista
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - name: gitvista
    repository:
      owner: rybkr
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/rybkr/gitvista"
    description: "Real-time Git repository visualization"
    license: "MIT"
    install: |
      bin.install "gitvista"
    test: |
      system "#{bin}/gitvista", "-version"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
